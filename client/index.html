<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI College Survival Assistant</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>🎓 AI College Survival Assistant</h1>
            <p>
                Personalized Study Planning, Placement Preparation,
                Exam Strategy & Career Guidance
            </p>
        </div>

        <div class="form-card">

            <label for="branch">📚 Branch</label>
            <input
                id="branch"
                type="text"
                placeholder="Enter Branch (e.g. CSE)"
                aria-label="Branch">

            <label for="semester">🎯 Semester</label>
            <input
                id="semester"
                type="number"
                placeholder="Enter Semester"
                aria-label="Semester">

            <label for="cgpa">⭐ CGPA</label>
            <input
                id="cgpa"
                type="number"
                step="0.1"
                placeholder="Enter CGPA"
                aria-label="CGPA">

            <label for="hours">⏰ Daily Study Hours</label>
            <input
                id="hours"
                type="number"
                placeholder="Enter Study Hours"
                aria-label="Study Hours">

            <label for="placement">🚀 Months Left For Placement</label>
            <input
                id="placement"
                type="number"
                placeholder="Enter Months Left"
                aria-label="Placement Timeline">

            <label for="attendance">📅 Attendance Percentage</label>
            <input
                id="attendance"
                type="number"
                placeholder="Enter Attendance Percentage"
                aria-label="Attendance">

            <label for="skill">💻 Primary Skill</label>
            <input
                id="skill"
                type="text"
                placeholder="Example: AI/ML, Web Development"
                aria-label="Skill">

            <label for="daysLeft">📝 Days Left For Exam</label>
            <input
                id="daysLeft"
                type="number"
                placeholder="Enter Days Remaining"
                aria-label="Days Left For Exam">

            <button onclick="generatePlan()">
                Generate AI Survival Report
            </button>

            <div class="action-buttons">
                <button onclick="downloadPDF()">
                    📥 Download PDF
                </button>

                <button onclick="location.reload()">
                    🔄 Reset
                </button>
            </div>

        </div>

        <div id="result" aria-live="polite"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
